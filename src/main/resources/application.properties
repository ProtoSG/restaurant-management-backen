# Application Name
spring.application.name=restaurant-management-backend

# Active Profile Configuration
# Options: dev, prod
# Default: dev (for development)
# Override with: --spring.profiles.active=prod or environment variable SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Common Configuration (shared across all profiles)
# Profile-specific configurations are in:
# - application-dev.properties (development environment)
# - application-prod.properties (production environment)

# JPA Common Settings
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

