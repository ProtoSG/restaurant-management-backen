# Production Environment Configuration
# This profile is active in production-like environment

# Server Configuration
server.servlet.context-path=/api 
server.port=8081

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/ddbb_restaurant_management_prod?user=postgres&password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging Configuration - Less verbose for production
logging.level.root=WARN
logging.level.com.restaurant_management=INFO
logging.level.org.springframework.web=WARN

# Document API 
scalar.enabled=true
scalar.path=docs
scalar.url=http://localhost:8081/api/v3/api-docs

# Frontend URL for CORS - Production frontend
frontend.url=${FRONTEND_URL:http://localhost:5174}

# Security - JWT Configuration
application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# Production specific settings
spring.devtools.restart.enabled=false
