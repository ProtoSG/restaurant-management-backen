server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: WARN
    com.restaurant_management: INFO
    org.springframework.web: WARN

scalar:
  enabled: ${SCALAR_ENABLED:false}
  path: docs
  url: ${API_DOCS_URL:http://localhost:8080/api/v3/api-docs}

frontend:
  url: ${FRONTEND_URL}

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}

cookie:
  secure: true
  same-site: None
